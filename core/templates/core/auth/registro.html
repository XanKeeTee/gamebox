{% extends 'base.html' %}

{% block title %}Registro - GameLog{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-4">
    <div class="w-full max-w-md relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-fuchsia-600 to-cyan-500 rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
        
        <div class="relative bg-[#0d1117] border border-gray-800 rounded-3xl p-10 shadow-2xl overflow-hidden">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-fuchsia-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-fuchsia-500/20">
                    <i class="fa-solid fa-user-plus text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Crear Cuenta</h1>
            </div>

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                {% for field in form %}
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">{{ field.label }}</label>
                    <div class="relative">
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" 
                               class="w-full bg-[#161b22] border border-gray-700/50 rounded-xl py-3.5 px-4 text-white focus:outline-none focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500/50 transition-all font-medium">
                    </div>
                    {% if field.errors %}
                        <p class="text-red-500 text-[10px] font-bold uppercase mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="w-full py-4 mt-4 bg-gradient-to-r from-fuchsia-600 to-purple-600 hover:from-fuchsia-500 hover:to-purple-500 text-white font-black rounded-2xl transition-all shadow-[0_0_20px_rgba(217,70,239,0.3)] hover:shadow-[0_0_30px_rgba(217,70,239,0.5)] transform hover:-translate-y-1 uppercase tracking-widest text-sm">
                    Registrarme
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-800 text-center text-xs">
                <p class="text-gray-500">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-cyan-400 font-bold">Inicia Sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
